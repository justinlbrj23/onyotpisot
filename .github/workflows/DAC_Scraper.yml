name: Fetch NMLS Data

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # --------------------------------------------------
      # Checkout Repo
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Setup Node.js
      # --------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --------------------------------------------------
      # Install system dependencies (Chrome + Xvfb + libs)
      # (Handle Ubuntu 24.04 t64 package names for libasound2)
      # --------------------------------------------------
      - name: Install Chrome, Xvfb and required libraries
        run: |
          set -euxo pipefail
          sudo apt-get update

          # Core libs (exclude libasound2 here; handle below due to t64 rename on Ubuntu 24.04+)
          sudo apt-get install -y \
            xvfb wget ca-certificates \
            fonts-liberation fonts-noto-color-emoji \
            libatk-bridge2.0-0 libatk1.0-0 libcups2 libdbus-1-3 libdrm2 \
            libgbm1 libgtk-3-0 libnspr4 libnss3 libx11-xcb1 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 libwayland-client0 \
            libxshmfence1 libglib2.0-0 xdg-utils libu2f-udev libvulkan1

          # Handle libasound2 name difference across Ubuntu releases
          (sudo apt-get install -y libasound2) || (sudo apt-get install -y libasound2t64)

          # Install Google Chrome Stable
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb || \
            (sudo apt-get -f install -y && sudo apt-get install -y ./google-chrome-stable_current_amd64.deb)

          google-chrome --version

      # --------------------------------------------------
      # Install OCR dependencies (for NON-CAPTCHA OCR only)
      # --------------------------------------------------
      - name: Install OCR dependencies (non-captcha OCR only)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr imagemagick poppler-utils ghostscript

      # --------------------------------------------------
      # Install Node Dependencies (skip Chromium download; use system Chrome)
      # --------------------------------------------------
      - name: Install Node dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          # Your project deps; puppeteer is required for the run
          npm install googleapis node-fetch puppeteer cheerio pdfkit he

      # --------------------------------------------------
      # Write RAW Service Account JSON
      # --------------------------------------------------
      - name: Write Service Account JSON
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      # --------------------------------------------------
      # Validate Service Account JSON
      # --------------------------------------------------
      - name: Validate service account JSON
        run: |
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('service-account.json','utf8'));
            if (!j.private_key || !j.client_email) {
              throw new Error('Invalid service account JSON');
            }
            console.log('Service account OK:', j.client_email);
          "

      # --------------------------------------------------
      # Run NMLS Scraper under Xvfb (visible Chrome in virtual display)
      # Add timeout so CI won't hang on CAPTCHA prompt.
      # --------------------------------------------------
      - name: Run NMLS Scraper via Xvfb
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          # === OPTIONAL: Non-captcha OCR toggles ===
          # Turn on ONLY when you want to OCR a NON-CAPTCHA image/PDF your script creates.
          RUN_OCR_NON_CAPTCHA: 'false'              # set to 'true' to enable
          OCR_INPUT_PATH: 'artifacts/step3_terms_checked.jpg'   # example; DO NOT point to captcha_*.png
          # === OPTIONAL: ZIP/captcha timing (script defaults exist) ===
          ZIP_CODE: '33122'
          CAPTCHA_TIMEOUT_MS: '300000'              # 5 minutes
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          # Use a 1920x1080x24 virtual screen; adjust as needed
          timeout 180s xvfb-run -a --server-args="-screen 0 1920x1080x24" \
            node nmls_elements.cjs || true

      # --------------------------------------------------
      # Upload ALL screenshot artifacts
      # --------------------------------------------------
      - name: Upload NMLS Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nmls-artifacts
          path: artifacts/**

      # --------------------------------------------------
      # Cleanup credentials
      # --------------------------------------------------
      - name: Cleanup secrets
        if: always()
        run: rm -f service-account.json
