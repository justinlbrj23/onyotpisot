name: OCR (Image or PDF)

on:
  workflow_dispatch:
    inputs:
      input_path:
        description: "Path to file to OCR (image or PDF) relative to repo root"
        required: true
        default: "sample.pdf"
      polarity:
        description: "Polarity: light-on-dark | dark-on-light | auto"
        required: false
        default: "light-on-dark"
      psm:
        description: "Tesseract PSM (7 for single line, 6 for blocks)"
        required: false
        default: "7"
      dpi:
        description: "Rasterization DPI for PDF"
        required: false
        default: "350"
      code_len:
        description: "Expected fixed code length (leave blank to skip)"
        required: false
        default: ""
      whitelist:
        description: "Whitelist characters (e.g., A-Z0-9). Leave blank to skip."
        required: false
        default: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
      max_par:
        description: "Max parallel OCR workers"
        required: false
        default: "4"

jobs:
  ocr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng imagemagick poppler-utils ghostscript

      - name: Show tool versions
        run: |
          node -v
          tesseract --version || true
          magick -version 2>/dev/null || convert -version || true
          pdftoppm -v || true
          gs --version || true

      - name: Install npm dependencies
        run: npm install

      - name: Run OCR
        env:
          OCR_POLARITY: ${{ github.event.inputs.polarity }}
          OCR_PSM: ${{ github.event.inputs.psm }}
          OCR_DPI: ${{ github.event.inputs.dpi }}
          OCR_CODE_LEN: ${{ github.event.inputs.code_len }}
          OCR_WHITELIST: ${{ github.event.inputs.whitelist }}
          OCR_MAX_PAR: ${{ github.event.inputs.max_par }}
        run: |
          FILE="${{ github.event.inputs.input_path }}"
          if [ ! -f "$FILE" ]; then
            echo "File '$FILE' does not exist!"
            exit 1
          fi
          node ocr_pipeline.js "$FILE"

      - name: List OCR output
        run: ls -lah ocr_output/ || true

      - name: Upload OCR results
        uses: actions/upload-artifact@v4
        with:
          name: ocr-output
          path: ocr_output/
