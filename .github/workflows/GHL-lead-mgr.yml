name: GHL CSV Processor

on:
  workflow_dispatch:

jobs:
  process-sheet:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # CHECKOUT REPOSITORY
      # ==========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # SETUP PYTHON
      # ==========================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ==========================================
      # INSTALL DEPENDENCIES
      # ==========================================
      - name: Install Dependencies
        run: |
          pip install pandas gspread google-auth

      # ==========================================
      # CREATE GOOGLE SERVICE ACCOUNT FILE
      # ==========================================
      - name: Create Google Credentials File
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      # ==========================================
      # RUN PYTHON SCRIPT
      # ==========================================
      - name: Run CSV Processor
        run: |
          python process_sheet.py

      # ==========================================
      # UPLOAD CSV ARTIFACT
      # ==========================================
      - name: Upload Processed CSV
        uses: actions/upload-artifact@v4
        with:
          name: processed-csv
          path: processed_output.csv
