name: Google Sheets CSV Processor

on:
  workflow_dispatch:

jobs:
  process-sheet:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install pandas gspread google-auth

      - name: Write Service Account JSON
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Validate service account JSON
        run: |
          python -c "
import json
with open('service-account.json', 'r') as f:
    j = json.load(f)
print('Service account OK:', j['client_email'])
"

      - name: Run Python Script
        run: |
          python GHL-lead-mgr.py

      - name: Upload Processed CSV
        uses: actions/upload-artifact@v4
        with:
          name: processed-csv
          path: processed_output.csv
