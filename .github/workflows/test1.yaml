name: Surplus Riches Automation test

on:
  workflow_dispatch:

jobs:

  # --------------------------------------------------
  # JOB 4 — PDF Cross Reference Check (LAST STEP)
  # --------------------------------------------------
  surplus_pdf_crossref:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm install googleapis pdf-parse

      - name: Write Service Account JSON
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Validate service account JSON
        run: |
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('service-account.json','utf8'));
            if (!j.private_key || !j.client_email) {
              throw new Error('Invalid service account JSON');
            }
            console.log('Service account OK:', j.client_email);
          "

      - name: Run PDF Cross Reference Checker
        run: node surplus_pdf_crossref.cjs

      - name: Cleanup secrets
        if: always()
        run: rm -f service-account.json
